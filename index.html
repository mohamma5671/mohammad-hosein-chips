    color:white;
    padding:20px;
    text-align:center;
}

.container{

.card{
    background:white;

    box-shadow:0 2px 8px rgba(0,0,0,0.1);

.price{

button{
    background:#25D366;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1da851;
}

footer{
    text-align:center;
    padding:15px;
    background:#eee;
    margin-top:20px;

</html>
