<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Search Console Verification -->
<meta name="google-site-verification" content="ms3guY7g9U0X9XKcyPKQHYuAmAthyCGcGL9OfrVSIQQ" />

<title>چیپس محمد | فروشگاه حرفه‌ای</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Vazirmatn;
    direction:rtl;
    background:#f5f7fb;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#ff9800,#ff5722);
    color:white;
    text-align:center;
    padding:25px;
}

/* LOGO */
.logo{
    width:110px;
    height:auto;
    margin-bottom:10px;
}

/* PRODUCTS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.content{
    padding:10px;
}

.price{
    color:green;
    font-weight:bold;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1ebe5d;
}

/* CART */
.cart{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <img src="https://img.icons8.com/emoji/96/french-fries.png" class="logo">
    <h1>🍟 چیپس محمد</h1>
    <p>فروشگاه حرفه‌ای چیپس خانگی</p>
</header>

<!-- PRODUCTS -->
<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1604908177522-0401f0f0f0c8">
        <div class="content">
            <h3>چیپس فلفلی 🔥</h3>
            <p class="price">۷۰,۰۰۰</p>
            <button onclick="buy('چیپس فلفلی',70000)">خرید سریع</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
        <div class="content">
            <h3>چیپس نمکی 😋</h3>
            <p class="price">۸۰,۰۰۰</p>
            <button onclick="buy('چیپس نمکی',80000)">خرید سریع</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1621939514649-280e2ee25f60">
        <div class="content">
            <h3>چیپس پنیری 🧀</h3>
            <p class="price">۹۵,۰۰۰</p>
            <button onclick="buy('چیپس پنیری',95000)">خرید سریع</button>
        </div>
    </div>

</div>

<!-- CART -->
<div class="cart">
    <h2>🛒 سفارش سریع</h2>
    <p id="status">هنوز سفارشی ثبت نشده</p>
</div>

<script>
function buy(name,price){
    let phone="989134701229";
    let msg=`🍟 سفارش:\n${name} - ${price} تومان`;

    document.getElementById("status").innerText="سفارش ثبت شد ✔";

    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
