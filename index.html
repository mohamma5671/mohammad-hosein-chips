<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>چیپس خانگی محمد</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Vazirmatn;
    direction:rtl;
    background:#f5f7fb;
}

/* هدر */
header{
    background:linear-gradient(135deg,#ff9800,#ff5722);
    color:white;
    text-align:center;
    padding:30px 15px;
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
}

/* نوار بالا */
nav{
    position:sticky;
    top:0;
    background:white;
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

nav button{
    border:none;
    padding:10px 15px;
    border-radius:12px;
    cursor:pointer;
    background:#eee;
    transition:0.2s;
}

nav button:hover{
    background:#ddd;
    transform:scale(1.05);
}

/* سرچ */
#search{
    width:90%;
    max-width:400px;
    margin:15px auto;
    display:block;
    padding:10px;
    border-radius:12px;
    border:1px solid #ccc;
}

/* محصولات */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.25s;
}

.card:hover{
    transform:translateY(-5px);
}

.price{
    color:#2ecc71;
    font-size:18px;
    font-weight:bold;
}

/* دکمه */
button{
    border:none;
    cursor:pointer;
}

.add{
    width:100%;
    padding:10px;
    background:#25D366;
    color:white;
    border-radius:12px;
    margin-top:10px;
}

/* سبد */
.cart{
    background:white;
    margin:20px;
    padding:15px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* حذف */
.remove{
    background:red;
    color:white;
    padding:5px 8px;
    border-radius:8px;
    margin-right:5px;
}

/* فوتر */
footer{
    text-align:center;
    padding:15px;
    background:#222;
    color:white;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>🍟 چیپس خانگی محمد</h1>
<p>تازه • خوشمزه • حرفه‌ای • دست‌ساز</p>
</header>

<nav>
<button onclick="showAll()">همه</button>
<button onclick="filter('فلفلی')">فلفلی</button>
<button onclick="filter('نمکی')">نمکی</button>
<button onclick="filter('مخصوص')">مخصوص</button>
</nav>

<input id="search" placeholder="🔍 جستجوی چیپس..." onkeyup="search()">

<!-- محصولات -->
<div class="container">

<div class="card" data-type="فلفلی">
<h3>چیپس فلفلی 🔥</h3>
<p>تند و خوشمزه</p>
<p class="price">۷۰,۰۰۰ تومان</p>
<button class="add" onclick="add('چیپس فلفلی',70000)">افزودن به سبد</button>
</div>

<div class="card" data-type="نمکی">
<h3>چیپس نمکی 😋</h3>
<p>طعم کلاسیک</p>
<p class="price">۸۰,۰۰۰ تومان</p>
<button class="add" onclick="add('چیپس نمکی',80000)">افزودن به سبد</button>
</div>

<div class="card" data-type="مخصوص">
<h3>چیپس مخصوص 🌟</h3>
<p>ترکیب ویژه</p>
<p class="price">۹۰,۰۰۰ تومان</p>
<button class="add" onclick="add('چیپس مخصوص',90000)">افزودن به سبد</button>
</div>

<div class="card" data-type="مخصوص">
<h3>چیپس پنیری 🧀</h3>
<p>طعم پنیر خوشمزه</p>
<p class="price">۹۵,۰۰۰ تومان</p>
<button class="add" onclick="add('چیپس پنیری',95000)">افزودن به سبد</button>
</div>

</div>

<!-- سبد خرید -->
<div class="cart">
<h2>🛒 سبد خرید</h2>
<div id="cartBox">سبد خالی است</div>
<br>
<button class="add" onclick="send()">ارسال سفارش در واتساپ</button>
</div>

<footer>
© 2026 چیپس خانگی محمد | همه حقوق محفوظ است
</footer>

<script>

let cart = [];

function add(name,price){
    cart.push({name,price});
    render();
}

function render(){
    let box = document.getElementById("cartBox");

    if(cart.length==0){
        box.innerHTML = "سبد خالی است";
        return;
    }

    let total = 0;
    let html = "";

    cart.forEach((c,i)=>{
        html += `
        <p>
        ${c.name} - ${c.price} تومان
        <button class="remove" onclick="removeItem(${i})">حذف</button>
        </p>`;
        total += c.price;
    });

    html += "<hr><b>جمع کل: "+total+" تومان</b>";
    box.innerHTML = html;
}

function removeItem(i){
    cart.splice(i,1);
    render();
}

function send(){
    let phone = "989134701229";

    if(cart.length==0){
        alert("سبد خالی است");
        return;
    }

    let msg = "🍟 سفارش جدید:\n\n";

    cart.forEach(c=>{
        msg += "▪ " + c.name + " - " + c.price + " تومان\n";
    });

    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

function filter(type){
    let cards = document.querySelectorAll(".card");

    cards.forEach(c=>{
        c.style.display = (type=="همه" || c.getAttribute("data-type")==type) ? "block":"none";
    });
}

function showAll(){
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display="block";
    });
}

function search(){
    let val = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(c=>{
        c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
    });
}

</script>

</body>
</html>
