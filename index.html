<style>

    font-family:Vazirmatn,sans-serif;
    direction:rtl;
    background:#f5f7fb;
}

header{
    background:linear-gradient(135deg,#ff9800,#ff5722);
    color:white;
    text-align:center;
    padding:25px;
}

.logo{
    width:100px;
}

.container{

.card{

}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.content{
    padding:12px;
}

.price{
    color:green;
    font-weight:bold;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:white;
    cursor:pointer;
}

section{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
}

footer{
    text-align:center;
    padding:15px;
    background:#222;
    color:white;
}
</style>
</head>

</script>

</body>
</html>
