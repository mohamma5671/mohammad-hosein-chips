<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>چیپس محمد</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    direction:rtl;
    background:#f5f5f5;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#ff9800,#ff5722);
    color:white;
    text-align:center;
    padding:20px;
}

.logo{
    width:120px;
    height:auto;
    border-radius:50%;
    display:block;
    margin:0 auto;
}

/* PRODUCTS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.price{
    color:green;
    font-weight:bold;
}

/* BUTTON */
button{
    padding:8px;
    border:none;
    background:#25D366;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>چیپس محمد</h1>
<p>فروشگاه چیپس خانگی</p>
</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-0401f0f0f0c8">
<h3>چیپس فلفلی</h3>
<p class="price">70000</p>
<button>خرید</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
<h3>چیپس نمکی</h3>
<p class="price">80000</p>
<button>خرید</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1621939514649-280e2ee25f60">
<h3>چیپس پنیری</h3>
<p class="price">95000</p>
<button>خرید</button>
</div>

</div>

</body>
</html>
